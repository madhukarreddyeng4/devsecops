name: DevSecOps Pipeline

# Runs the full shift-left security pipeline on every push/PR to main:
# secrets scan -> SAST -> SCA -> container build+scan -> IaC scan -> deploy -> DAST
#
# Each stage produces an artifact report so findings can be reviewed even
# if a later stage fails. In Part 2 of this series, these reports become
# the input for the Claude Code AI remediation step.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

env:
  IMAGE_NAME: vulnshop
  IMAGE_TAG: ${{ github.sha }}

jobs:
  secrets-scan:
    name: "1. Secrets Scan (Gitleaks)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: app/.gitleaks.toml
        continue-on-error: true

      - name: Upload Gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: results.sarif
          if-no-files-found: ignore

  sast:
    name: "2. SAST (SonarQube)"
    runs-on: ubuntu-latest
    needs: secrets-scan
    steps:
      - uses: actions/checkout@v4
        with:
          # Disable shallow clone so SonarQube has full history for blame /
          # new-code detection.
          fetch-depth: 0

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      # Wait for SonarQube to compute the quality gate. In this tutorial we
      # don't fail the build on it (report-only) so every later stage still
      # runs; flip abortPipeline / the gate to blocking once your baseline
      # is clean. Requires the quality gate to be configured on the server.
      - name: SonarQube Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@v1.2.0
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  sca:
    name: "3. SCA - Dependency Scan (Trivy)"
    runs-on: ubuntu-latest
    needs: secrets-scan
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH,MEDIUM"
          format: "table"
          exit-code: "0" # don't fail the build in the demo; report only
          output: "trivy-fs-report.txt"

      - name: Upload Trivy SCA report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sca-report
          path: trivy-fs-report.txt
          if-no-files-found: ignore

  iac-scan:
    name: "4. IaC Scan (Checkov)"
    runs-on: ubuntu-latest
    needs: secrets-scan
    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform-ec2
          framework: terraform
          output_format: cli
          soft_fail: true

  build-and-scan-image:
    name: "5. Build & Scan Container Image (Trivy)"
    runs-on: ubuntu-latest
    needs: [sast, sca, iac-scan]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} .

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          severity: "CRITICAL,HIGH"
          format: "table"
          exit-code: "0"
          output: "trivy-image-report.txt"

      - name: Upload Trivy image report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report
          path: app/trivy-image-report.txt
          if-no-files-found: ignore

  deploy-ec2:
    name: "6. Deploy to EC2"
    runs-on: ubuntu-latest
    needs: build-and-scan-image
    environment: demo
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            APP_DIR=/opt/vulnshop
            # Clone the repo on first deploy; pull on every deploy after that.
            # EC2_REPO_URL is a repo secret, e.g. https://github.com/<you>/devsecops.git
            if [ ! -d "$APP_DIR/.git" ]; then
              sudo mkdir -p "$APP_DIR"
              sudo chown "$USER":"$USER" "$APP_DIR"
              git clone "${{ secrets.EC2_REPO_URL }}" "$APP_DIR"
            fi
            cd "$APP_DIR"
            git pull origin main
            docker compose down || true
            docker compose up -d --build

            # Health check: wait for the app to actually respond before we
            # let the pipeline move on to DAST. Fail loudly (with logs) if it
            # never comes up, instead of letting ZAP fail confusingly later.
            echo "Waiting for app to become healthy on :3000 ..."
            for i in $(seq 1 30); do
              if curl -fsS http://localhost:3000/healthz >/dev/null 2>&1; then
                echo "App is healthy (attempt $i)."
                exit 0
              fi
              sleep 2
            done

            echo "::error::App did not become healthy within 60s after deploy."
            docker compose ps
            docker compose logs --tail=50
            exit 1

  dast:
    name: "7. DAST (OWASP ZAP)"
    runs-on: ubuntu-latest
    needs: deploy-ec2
    # ZAP files its findings as a GitHub Issue by default. The default
    # GITHUB_TOKEN is read-only, so without this it fails with
    # "Resource not accessible by integration". Grant issue write here.
    # (Alternatively, set `allow_issue_writing: false` below to skip issues
    # and rely on the uploaded HTML report instead.)
    permissions:
      contents: read
      issues: write
    steps:
      - name: Run ZAP baseline scan
        # v0.15.0+ updates the bundled upload-artifact dependency. Older
        # versions (e.g. v0.12.0) use a deprecated artifact backend and fail
        # with "The artifact name zap_scan is not valid" on current runners.
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: "http://${{ secrets.EC2_HOST }}:3000"
          cmd_options: "-a"
          fail_action: false
          # The action uploads the ZAP reports itself under this name — no
          # separate upload-artifact step needed.
          artifact_name: zap-report
