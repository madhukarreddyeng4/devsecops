# SonarQube analysis configuration for VulnShop.
#
# The scanner reads this file from the repo root. SONAR_TOKEN and
# SONAR_HOST_URL are supplied by the CI environment (GitHub Actions secrets
# or the Jenkins SonarQube server config), NOT hardcoded here.

sonar.projectKey=vulnshop
sonar.projectName=VulnShop
sonar.projectVersion=1.0

# Scan the backend and frontend source. Exclude build output, deps, and IaC
# (Terraform is covered separately by Checkov in stage 4).
sonar.sources=app,frontend/src
sonar.exclusions=**/node_modules/**,**/dist/**,**/*.test.js,terraform-ec2/**

# Encoding of the source files
sonar.sourceEncoding=UTF-8
